<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Học viện Nghi thức Hội</title>
<style>
:root {
  --green:#0b7f5b; --green2:#0fa879; --gold:#ffd166; --red:#ef476f;
  --dark:#09251f; --card:rgba(255,255,255,.88); --glass:rgba(255,255,255,.18);
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0c4338;color:white;min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.18),transparent 26%),linear-gradient(160deg,#0b513f,#07352e 55%,#05261f);z-index:-5}
.cloud{position:fixed;top:7%;left:-20%;font-size:40px;opacity:.25;animation:cloud 28s linear infinite;z-index:-4}.cloud:nth-child(2){top:18%;animation-duration:36s;animation-delay:-8s}@keyframes cloud{to{transform:translateX(140vw)}}
.app{max-width:1180px;margin:auto;padding:18px}
.hero,.game,.result{min-height:calc(100vh - 36px);display:none;align-items:center;justify-content:center}
.hero.active,.game.active,.result.active{display:flex}
.panel{width:min(100%,980px);border:1px solid rgba(255,255,255,.22);background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08));box-shadow:0 24px 80px rgba(0,0,0,.35);backdrop-filter:blur(16px);border-radius:28px;padding:28px;position:relative;overflow:hidden}
.title{font-size:clamp(32px,6vw,66px);font-weight:900;line-height:1.02;margin:8px 0;text-shadow:0 8px 28px rgba(0,0,0,.35)}
.sub{font-size:20px;opacity:.9}
.btn{border:0;border-radius:18px;background:linear-gradient(135deg,var(--gold),#ff9f1c);color:#321;font-weight:900;padding:15px 24px;font-size:18px;cursor:pointer;box-shadow:0 12px 30px rgba(0,0,0,.28);transition:.2s}
.btn:hover{transform:translateY(-2px) scale(1.02)}.btn.secondary{background:rgba(255,255,255,.14);color:white;border:1px solid rgba(255,255,255,.25)}
.flag{position:absolute;right:28px;top:26px;width:58px;height:92px;background:linear-gradient(90deg,#12a06f,#0b805d);clip-path:polygon(0 0,100% 0,100% 75%,50% 62%,0 75%);animation:wave 2s ease-in-out infinite;box-shadow:0 8px 20px rgba(0,0,0,.2)}
.flag:after{content:'★';position:absolute;top:14px;left:0;right:0;text-align:center;color:var(--gold);font-size:28px}@keyframes wave{50%{transform:skewY(4deg)}}
.topbar{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:14px}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.pill{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:9px 13px;font-weight:800}
.progress{height:14px;background:rgba(255,255,255,.14);border-radius:999px;overflow:hidden;margin:10px 0 14px;border:1px solid rgba(255,255,255,.2)}
.progress>div{height:100%;width:0;background:linear-gradient(90deg,var(--gold),#06d6a0);border-radius:999px;transition:.4s}
.stage{display:grid;grid-template-columns:minmax(260px,42%) 1fr;gap:18px;align-items:stretch}
.field{min-height:440px;background:linear-gradient(#59b66e 0 60%,#377b45);border:9px solid rgba(255,255,255,.22);border-radius:28px;position:relative;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.25)}
.field:before{content:'';position:absolute;inset:18px;border:2px dashed rgba(255,255,255,.28);border-radius:18px}
.pole{position:absolute;left:32px;top:35px;width:5px;height:130px;background:#e5e7eb;border-radius:5px;z-index:3}.pole:after{content:'';position:absolute;left:5px;top:4px;width:70px;height:42px;background:#d90429;clip-path:polygon(0 0,100% 10%,100% 90%,0 100%);animation:wave 1.6s ease-in-out infinite}.pole .star{position:absolute;color:#ffd166;top:11px;left:24px;z-index:4}
.commander{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:38px;filter:drop-shadow(0 10px 10px rgba(0,0,0,.28));z-index:5}
.member{position:absolute;width:22px;height:22px;border-radius:50%;background:#e7fff2;border:3px solid #07523f;box-shadow:0 5px 10px rgba(0,0,0,.22);transition:all .55s cubic-bezier(.2,.8,.2,1)}
.member:after{content:'';position:absolute;left:4px;right:4px;bottom:-11px;height:12px;border-radius:6px 6px 10px 10px;background:#097a5d}
.field.correct .member{background:#ffe082;transform:scale(1.12)}.field.wrong{animation:shake .4s}.field.wrong .member:nth-child(odd){transform:translate(9px,-4px)}@keyframes shake{25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}
.questionCard{background:var(--card);color:var(--dark);border-radius:26px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.28);min-height:440px;display:flex;flex-direction:column}
.badgeLine{display:flex;align-items:center;gap:10px;color:#0b7f5b;font-weight:900;margin-bottom:10px}
.qtext{font-size:clamp(19px,2.2vw,28px);font-weight:900;line-height:1.25;margin:4px 0 16px}
.answers{display:grid;gap:11px;margin-top:auto}
.answer{width:100%;text-align:left;border:2px solid #d7e7df;background:white;border-radius:17px;padding:13px 14px;font-size:16px;font-weight:750;cursor:pointer;display:flex;gap:11px;align-items:flex-start;transition:.18s;color:#12352d}
.answer:hover{border-color:#0fa879;transform:translateX(4px);box-shadow:0 8px 20px rgba(0,0,0,.12)}
.letter{flex:0 0 34px;height:34px;border-radius:12px;background:#e7f7ef;color:#08775a;display:grid;place-items:center;font-weight:1000}
.answer.correct{background:#d8ffe7;border-color:#06b66b}.answer.wrong{background:#ffe0e8;border-color:#ef476f}.answer.disabled{pointer-events:none}
.feedback{margin-top:12px;min-height:42px;font-weight:900;font-size:18px;color:#0b7f5b}.feedback.bad{color:#d22b55}
.controls{display:flex;gap:10px;justify-content:space-between;margin-top:12px;flex-wrap:wrap}
.unlocks{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.skill{border-radius:14px;padding:8px 10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);font-size:13px;font-weight:800;opacity:.55}.skill.on{opacity:1;background:rgba(255,209,102,.22);border-color:var(--gold)}
.certificate{text-align:center}.scoreBig{font-size:58px;font-weight:1000;color:var(--gold);margin:8px 0}
@media(max-width:820px){.stage{grid-template-columns:1fr}.field{min-height:310px}.panel{padding:18px}}
</style>
</head>
<body>
<div class="bg"></div><div class="cloud">☁️</div><div class="cloud">☁️</div>
<div class="app">
  <section id="hero" class="hero active"><div class="panel"><div class="flag"></div><div class="sub">HỘI ĐỒNG HUẤN LUYỆN KỸ NĂNG</div><div class="title">🎖️ HỌC VIỆN<br>NGHI THỨC HỘI</div><p class="sub">111 câu • sân tập đội hình • hiệu ứng còi và âm thanh</p><button class="btn" onclick="startGame()">BẮT ĐẦU LUYỆN TẬP</button> <button class="btn secondary" onclick="toggleSound()" id="soundBtn">🔊 Âm thanh</button></div></section>
  <section id="game" class="game"><div class="panel" style="width:100%"><div class="topbar"><div><div class="stats"><div class="pill" id="qNo">Câu 1/111</div><div class="pill" id="rightP">✔ 0</div><div class="pill" id="wrongP">✘ 0</div><div class="pill" id="scoreP">⭐ 0</div></div><div class="progress"><div id="bar"></div></div></div><button class="btn secondary" onclick="toggleSound()" id="soundBtn2">🔊</button></div><div class="stage"><div class="field" id="field"><div class="pole"><span class="star">★</span></div><div class="commander">🧑‍✈️📢</div></div><div class="questionCard"><div class="badgeLine" id="modeLabel">📢 Người chỉ huy</div><div class="qtext" id="questionText"></div><div class="answers" id="answers"></div><div class="feedback" id="feedback"></div><div class="controls"><button class="btn secondary" onclick="restart()">Làm lại</button><button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none">Câu tiếp</button></div></div></div><div class="unlocks" id="unlocks"></div></div></section>
  <section id="result" class="result"><div class="panel certificate"><div class="title">🏅 HOÀN THÀNH</div><p class="sub">Chứng nhận luyện tập Nghi thức Hội</p><div class="scoreBig" id="finalScore"></div><p id="finalText" class="sub"></p><button class="btn" onclick="restart()">CHƠI LẠI</button></div></section>
</div>
<script>
const QUESTIONS = [{"id": 1, "question": "Hội LHTN Việt Nam có bao nhiêu chức năng?", "options": [{"letter": "A", "text": "1 chức năng"}, {"letter": "B", "text": "2 chức năng"}, {"letter": "C", "text": "3 chức năng"}, {"letter": "D", "text": "4 chức năng"}], "answer": "B"}, {"id": 2, "question": "Hội LHTN Việt Nam có bao nhiêu nhiệm vụ?", "options": [{"letter": "A", "text": "2 nhiệm vụ"}, {"letter": "B", "text": "3 nhiệm vụ"}, {"letter": "C", "text": "4 nhiệm vụ"}, {"letter": "D", "text": "5 nhiệm vụ"}], "answer": "D"}, {"id": 3, "question": "Từ khi thành lập đến nay, Hội Liên hiệp thanh niên Việt Nam trải qua mấy kỳ đại hội?", "options": [{"letter": "A", "text": "7 kỳ đại hội."}, {"letter": "B", "text": "8 kỳ đại hội."}, {"letter": "C", "text": "9 kỳ đại hội."}, {"letter": "D", "text": "10 kỳ đại hội."}], "answer": "C"}, {"id": 4, "question": "Điều kiện để được công nhận là thành viên hội LHTN Việt Nam là:", "options": [{"letter": "A", "text": "Công dân Việt Nam từ 15 -35 tuổi tán thành điều lệ Hội. tự nguyện gia nhập Hội và tự nguyện sinh hoạt trong một tổ chức của Hội hoặc của Đoàn TN Cộng sản Hồ Chí Minh thì được xét công nhận là hội viên hội LHTN Việt Nam."}, {"letter": "B", "text": "Công dân Việt Nam từ 15 -30 tuổi tán thành điều lệ Hội, tự nguyện gia nhập Hội thì được xét công nhận là hội viên hội LHTN Việt Nam."}, {"letter": "C", "text": "Những người quá 35 tuổi có nguyện vọng và ảnh hưởng tích cực đến hoạt động Hội thì được tham gia hoạt động trong tổ chức Hội."}, {"letter": "D", "text": "Câu a & c đúng"}], "answer": "A"}, {"id": 5, "question": "Bài ca chính thức của Hội LHTN Việt Nam là bài:", "options": [{"letter": "A", "text": "Thanh niên làm theo lời Bác"}, {"letter": "B", "text": "Tuổi trẻ thế hệ Bác Hồ"}, {"letter": "C", "text": "Lên Đàng (Lời 1)."}, {"letter": "D", "text": "Khát vọng tuổi trẻ"}], "answer": "C"}, {"id": 6, "question": "Thành viên tập thể có vai trò nòng cốt trong tổ chức và hoạt động của Hội là:", "options": [{"letter": "A", "text": "Hội Sinh Viên Việt Nam."}, {"letter": "B", "text": "Đoàn TNCS Hồ Chí Minh."}, {"letter": "C", "text": "Các đội hình thanh niên xung phong, các tổ chức thanh niên theo ngành nghề, sở thích; các tổ chức thanh niên Việt Nam ở nước ngoài tuân thủ Hiến pháp, pháp luật nước Cộng hòa xã hội chủ nghĩa Việt Nam, nếu tán thành Điều lệ Hội thì được Đòan chủ tịch Ủy ban TW Hội xét, công nhận."}, {"letter": "D", "text": "Cả 3 đều đúng"}], "answer": "B"}, {"id": 7, "question": "Hội LHTN Việt Nam tổ chức và hoạt động theo nguyên tắc:", "options": [{"letter": "A", "text": "Tự nguyện, tự quản; hiệp thương dân chủ"}, {"letter": "B", "text": "Tự nguyện tự quản; hiệp thương dân chủ, chịu sự lãnh đạo của Đảng"}, {"letter": "C", "text": "Đoàn kết tôn trọng lẫn nhau; hợp tác bình đẳng, phối hợp và thống nhất hành động."}, {"letter": "D", "text": "Câu a và c đúng."}], "answer": "D"}, {"id": 8, "question": "Một trong những nhiệm vụ của Hội LHTN Việt Nam là:", "options": [{"letter": "A", "text": "Quản lý hành chính nhà nước về thanh niên"}, {"letter": "B", "text": "Khuyến khích và tổ chức hội viên, thanh niên tham gia sự nghiệp công nghiệp hóa, hiện đại hóa đất nước"}, {"letter": "C", "text": "Cấp giấy phép hoạt động cho thanh niên"}, {"letter": "D", "text": "Quản lý doanh nghiệp thanh niên"}], "answer": "B"}, {"id": 9, "question": "Điều lệ Hội gồm có:", "options": [{"letter": "A", "text": "8 chương 28 điều."}, {"letter": "B", "text": "7 chương 27 điều."}, {"letter": "C", "text": "6 chương 27 điều."}, {"letter": "D", "text": "8 chương 27 điều."}], "answer": "A"}, {"id": 10, "question": "Hội LHTN Việt Nam là :", "options": [{"letter": "A", "text": "Tổ chức chính trị – xã hội của thanh niên Việt Nam"}, {"letter": "B", "text": "Tổ chức xã hội rộng rãi của thanh niên và các tổ chức thanh niên Việt Nam yêu nước theo tư tưởng Hồ Chí Minh và lý tưởng của Đảng cộng sản Việt Nam."}, {"letter": "C", "text": "Tổ chức xã hội nghề nghiệp của thanh niên Việt Nam"}, {"letter": "D", "text": "Tổ chức tập hợp những người cùng lứa tuổi, cùng sở thích."}], "answer": "B"}, {"id": 11, "question": "Bài Hội ca “ Lên đàng” - nhạc và lời do ai sáng tác?", "options": [{"letter": "A", "text": "Nhạc : Huỳnh Văn Tiểng"}, {"letter": "B", "text": "Nhạc : Lưu Hữu Phước Lời : Lưu Hữu Phước Lời : Huỳnh Văn Tiểng Lưu Hữu Phước"}, {"letter": "C", "text": "Nhạc và lời : Lưu Hữu Phước"}, {"letter": "D", "text": "Nhạc : Nam Cao Lời : Huỳnh Văn Tiểng"}], "answer": "B"}, {"id": 12, "question": "Bài “ Lên Đàng” được hát trong dịp :", "options": [{"letter": "A", "text": "Lúc chơi vòng tròn , sinh hoạt tập thể"}, {"letter": "B", "text": "Nghi lễ của Hội"}, {"letter": "C", "text": "Lửa trại"}, {"letter": "D", "text": "Cả 3 câu trên đều đúng."}], "answer": "D"}, {"id": 13, "question": "Hội LHTN Việt Nam là thành viên của", "options": [{"letter": "A", "text": "Mặt trận Tổ quốc Việt Nam"}, {"letter": "B", "text": "Đoàn TNCS Hồ Chí Minh"}, {"letter": "C", "text": "Không là thành viên của tổ chức nào cả"}, {"letter": "D", "text": "Cả 3 câu trên đều sai."}], "answer": "A"}, {"id": 14, "question": "Khẩu hiệu của Hội LHTN Việt Nam là:", "options": [{"letter": "A", "text": "“Vì tổ quốc XHCN, vì lý tưởng của Bác Hồ vĩ đại” – Đáp : “sẵn sàng”"}, {"letter": "B", "text": "“Vì tổ quốc Việt Nam XHCN giàu mạnh và văn minh – Thanh niên” – Đáp:“Tiến”"}, {"letter": "C", "text": "“Vì tổ quốc Việt Nam văn minh và giàu mạnh – Thanh niên ” – Đáp : “Tiến”"}, {"letter": "D", "text": "“Vì tổ quốc Việt Nam giàu mạnh và văn minh – Thanh niên ” – Đáp : “Tiến”"}], "answer": "D"}, {"id": 15, "question": "Ý nghĩa màu xanh trên biểu trưng của Hội là:", "options": [{"letter": "A", "text": "Thể hiện sự hoà bình."}, {"letter": "B", "text": "Thể hiện sự thanh bình"}, {"letter": "C", "text": "Thể hiện sự hy vọng."}, {"letter": "D", "text": "Cả 3 câu trên đều sai."}], "answer": "B"}, {"id": 16, "question": "Ý nghĩa hình tròn của biểu trưng Hội là:", "options": [{"letter": "A", "text": "Thể hiện ước mơ nối vòng tay lớn."}, {"letter": "B", "text": "Thể hiện ước mơ giao lưu, kết bạn."}, {"letter": "C", "text": "Thể hiện ước mơ tiến đến sự hoàn thiện, đoàn kết."}, {"letter": "D", "text": "Thể hiện ước mơ vươn đến sự hoàn thiện, đoàn kết, thân ái."}], "answer": "D"}, {"id": 17, "question": "Chào Hội có mấy cách:", "options": [{"letter": "A", "text": "2 cách: chào trong nghi lễ, chào trong đời thường"}, {"letter": "B", "text": "1 cách: chào trong nghi lễ"}, {"letter": "C", "text": "2 cách: chào trong nghi lễ, chào trong sinh hoạt."}, {"letter": "D", "text": "3 cách: chào trong nghi lễ, chào trong sinh hoạt, chào khi gặp nhau bình thường."}], "answer": "C"}, {"id": 18, "question": "Hội LHTN Việt Nam được tổ chức ở:", "options": [{"letter": "A", "text": "Trung ương: tỉnh, thành phố trực thuộc trung ương và tương đương; huyện, quận, thị xã, thành phố trực thuộc tỉnh và tương đương; xã, thị trấn và tương đương."}, {"letter": "B", "text": "Trung ương: tỉnh, thành phố, huyện, quận, xã, phường, thị trấn."}, {"letter": "C", "text": "Trung ương: tỉnh, thành phố trực thuộc trung ương và tương đương; huyện, quận, thị xã, thành phố trực thuộc tỉnh và tương đương"}, {"letter": "D", "text": "Trung ương; Tỉnh, thành phố trực thuộc trung ương và tương đương; Huyện, quận, thị xã, thành phố trực thuộc tỉnh và tương đương; Xã, thị trấn và tương đương; khu phố, ấp và tương đương."}], "answer": "D"}, {"id": 19, "question": "Ý nghĩa cách chào sinh hoạt:", "options": [{"letter": "A", "text": "Thể hiện sự chúc mừng, quan tâm lẫn nhau."}, {"letter": "B", "text": "Thể hiện sự đoàn kếr thân ái."}, {"letter": "C", "text": "Thể hiện sự chúc mừng, thăm hỏi và đến với nhau."}, {"letter": "D", "text": "Cả 3 câu trên đều sai."}], "answer": "C"}, {"id": 20, "question": "Hội LHTN Việt Nam có mục đích:", "options": [{"letter": "A", "text": "Đoàn kết các tầng lớp thanh niên Việt Nam cùng phấn đấu cho sự nghiệp công nghiệp hoá hiện đại hoá đất nước, bảo vệ vững chắc Tổ quốc Việt Nam XHCN"}, {"letter": "B", "text": "Đoàn kết tập hợp rộng rã : "Chi hội thành vòng tròn – Tập hợp"}], "answer": "D"}, {"id": 110, "question": "Trong đội hình hàng dọc khi so cự ly hẹp đặc biệt, hội viên thứ 2 của phân hội 1 thực hiện như thế nào?", "options": [{"letter": "A", "text": "Tay phải chạm tay trái phân hội trưởng phân hội 1"}, {"letter": "B", "text": "Tay trái chạm tay phải phân hội trưởng phân hội 1"}, {"letter": "C", "text": "Tay phải chạm vai phân hội trưởng phân hội 1, ngón tay khép, lòng bàn tay thẳng, bàn tay đứng"}, {"letter": "D", "text": "Tay phải chạm vai phân hội trưởng phân hội 1, ngón tay khép, lòng bàn tay úp xuống"}], "answer": "C"}, {"id": 111, "question": "Trong đội hình chữ U khi so cự ly hẹp, người cuối cùng của phân hội 2 thực hiện như thế nào", "options": [{"letter": "A", "text": "Tay phải trong tư thế nghiêm; Tay trái đưa ngang, thẳng, ngang vai, 5 ngón tay khép, lòng bàn tay úp"}, {"letter": "B", "text": "Tay phải trong tư thế nghiêm; Tay trái đưa ngang, thẳng, ngang vai, 5 ngón tay khép, lòng tay ngửa"}, {"letter": "C", "text": "Tay trái trong tư thế nghiêm; Tay phải đưa ngang, thẳng, ngang vai, 5 ngón tay khép, lòng bàn tay úp"}, {"letter": "D", "text": "Tay trái trong tư thế nghiêm; Tay phải đưa ngang, thẳng, ngang vai, 5 ngón tay khép, lòng tay ngửa"}], "answer": "A"}];
let idx=0, right=0, wrong=0, score=0, locked=false, soundOn=true, audioCtx=null;
const skills=['Tư thế nghiêm','Hàng dọc','Hàng ngang','Chữ U','Vòng tròn','Chào cờ','Rước cờ','Khẩu lệnh','Điểm số','Cự ly','Di động','Hoàn thành'];
function beep(freq=600,dur=.12,type='sine',vol=.06){ if(!soundOn) return; audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)(); const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur);}
function toggleSound(){soundOn=!soundOn; document.querySelectorAll('#soundBtn,#soundBtn2').forEach(b=>b.textContent=soundOn?'🔊 Âm thanh':'🔇 Tắt âm'); beep(700,.08)}
function startGame(){document.getElementById('hero').classList.remove('active');document.getElementById('game').classList.add('active');idx=right=wrong=score=0;renderUnlocks();renderQuestion();beep(880,.1);setTimeout(()=>beep(660,.1),120)}
function restart(){document.getElementById('result').classList.remove('active');document.getElementById('game').classList.add('active');idx=right=wrong=score=0;renderUnlocks();renderQuestion();}
function formationType(q){q=q.toLowerCase(); if(q.includes('chữ u')) return 'u'; if(q.includes('vòng tròn')) return 'circle'; if(q.includes('hàng ngang')) return 'row'; if(q.includes('hàng dọc')) return 'col'; if(q.includes('chào cờ')||q.includes('rước cờ')||q.includes('cờ')) return 'flag'; return ['row','col','u','circle'][idx%4];}
function labelFor(t){return {row:'▬ Đội hình hàng ngang', col:'▮ Đội hình hàng dọc', u:'⊔ Đội hình chữ U', circle:'⭕ Đội hình vòng tròn', flag:'🚩 Nghi lễ chào cờ'}[t]||'📢 Người chỉ huy'}
function placeMembers(type){const field=document.getElementById('field'); field.querySelectorAll('.member').forEach(e=>e.remove()); const pts=[]; const n=18; if(type==='col'){for(let i=0;i<n;i++) pts.push([50,18+i*3.8]);} else if(type==='row'||type==='flag'){for(let i=0;i<n;i++) pts.push([18+i*3.8,72]);} else if(type==='u'){for(let i=0;i<6;i++)pts.push([25,28+i*7]); for(let i=0;i<6;i++)pts.push([75,28+i*7]); for(let i=0;i<6;i++)pts.push([30+i*8,70]);} else {for(let i=0;i<n;i++){let a=2*Math.PI*i/n; pts.push([50+28*Math.cos(a),54+24*Math.sin(a)]);}} pts.forEach((p,i)=>{const m=document.createElement('div');m.className='member';m.style.left=`calc(${p[0]}% - 11px)`;m.style.top=`calc(${p[1]}% - 11px)`;m.style.transitionDelay=(i*0.012)+'s';field.appendChild(m);})}
function renderUnlocks(){const box=document.getElementById('unlocks'); box.innerHTML=''; skills.forEach((s,i)=>{let d=document.createElement('div');d.className='skill '+(idx>=i*10?'on':'');d.textContent=(idx>=i*10?'✓ ':'□ ')+s;box.appendChild(d);})}
function renderQuestion(){locked=false; const q=QUESTIONS[idx]; document.getElementById('qNo').textContent=`Câu ${idx+1}/${QUESTIONS.length}`; document.getElementById('rightP').textContent='✔ '+right; document.getElementById('wrongP').textContent='✘ '+wrong; document.getElementById('scoreP').textContent='⭐ '+score; document.getElementById('bar').style.width=((idx)/QUESTIONS.length*100)+'%'; const type=formationType(q.question); document.getElementById('modeLabel').textContent=labelFor(type); placeMembers(type); document.getElementById('field').className='field'; document.getElementById('questionText').textContent=q.question; const ans=document.getElementById('answers'); ans.innerHTML=''; q.options.forEach(o=>{const b=document.createElement('button'); b.className='answer'; b.innerHTML=`<span class="letter">${o.letter}</span><span>${o.text}</span>`; b.onclick=()=>choose(o.letter,b); ans.appendChild(b);}); document.getElementById('feedback').textContent=''; document.getElementById('feedback').className='feedback'; document.getElementById('nextBtn').style.display='none'; renderUnlocks(); beep(520,.06,'triangle',.025)}
function choose(letter,btn){if(locked) return; locked=true; const q=QUESTIONS[idx]; document.querySelectorAll('.answer').forEach(b=>b.classList.add('disabled')); if(letter===q.answer){right++; score+=10; btn.classList.add('correct'); document.getElementById('feedback').textContent='✅ Chính xác! Đội hình thực hiện chuẩn.'; document.getElementById('field').classList.add('correct'); beep(880,.1); setTimeout(()=>beep(1170,.12),120);} else {wrong++; btn.classList.add('wrong'); document.getElementById('feedback').textContent='❌ Chưa chính xác. Đáp án đúng là '+q.answer+'.'; document.getElementById('feedback').className='feedback bad'; document.getElementById('field').classList.add('wrong'); document.querySelectorAll('.answer').forEach(b=>{if(b.querySelector('.letter').textContent===q.answer)b.classList.add('correct')}); beep(180,.22,'sawtooth',.04);} document.getElementById('rightP').textContent='✔ '+right;document.getElementById('wrongP').textContent='✘ '+wrong;document.getElementById('scoreP').textContent='⭐ '+score; document.getElementById('nextBtn').style.display='inline-block';}
function nextQuestion(){idx++; if(idx>=QUESTIONS.length) return finish(); renderQuestion();}
function finish(){document.getElementById('game').classList.remove('active');document.getElementById('result').classList.add('active'); const pct=Math.round(right/QUESTIONS.length*1000)/10; document.getElementById('finalScore').textContent=pct+'%'; let rank=pct>=95?'Xuất sắc':pct>=85?'Giỏi':pct>=70?'Đạt':'Cần ôn thêm'; document.getElementById('finalText').textContent=`Đúng ${right}/${QUESTIONS.length} câu • Sai ${wrong} câu • Điểm ${score} • Xếp loại: ${rank}`; beep(880,.12);setTimeout(()=>beep(1040,.12),150);setTimeout(()=>beep(1320,.2),300)}
</script>

(function(){

    if(mode==='random' && typeof QUESTIONS!=='undefined' && Array.isArray(QUESTIONS)){
      for(let i=QUESTIONS.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[QUESTIONS[i],QUESTIONS[j]]=[QUESTIONS[j],QUESTIONS[i]];}
    }
  }catch(e){console.warn('shuffle disabled',e)}
  function addHome(){
    if(document.getElementById('hlvHomeBtn')) return;
