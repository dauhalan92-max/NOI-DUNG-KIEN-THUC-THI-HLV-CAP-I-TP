<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bầu trời định hướng - 126 câu</title>
<style>
:root {
  --bg1:#07112f; --bg2:#0d1b47; --cyan:#7ee7ff; --gold:#ffd36b; --good:#4ade80; --bad:#fb7185; --card:rgba(10,20,55,.72); --line:rgba(126,231,255,.35);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:white;overflow-x:hidden;background:radial-gradient(circle at top,#172554 0,#020617 65%);}
.sky{position:fixed;inset:0;overflow:hidden;z-index:-4;background:linear-gradient(180deg,#07112f 0%,#0f172a 55%,#020617 100%);}
.moon{position:absolute;right:8vw;top:7vh;width:86px;height:86px;border-radius:50%;background:#f8fafc;box-shadow:0 0 30px #fff,0 0 90px rgba(126,231,255,.4);}
.moon:after{content:"";position:absolute;left:24px;top:-4px;width:86px;height:86px;border-radius:50%;background:#07112f;}
.cloud{position:absolute;width:220px;height:54px;border-radius:50px;background:rgba(255,255,255,.08);filter:blur(.2px);animation:drift 45s linear infinite;}
.cloud:before,.cloud:after{content:"";position:absolute;border-radius:50%;background:inherit}.cloud:before{width:78px;height:78px;left:35px;top:-32px}.cloud:after{width:95px;height:95px;left:95px;top:-42px}
.c1{top:14vh;left:-240px}.c2{top:34vh;left:-360px;animation-duration:70s;opacity:.65}@keyframes drift{to{transform:translateX(125vw)}}
.star{position:absolute;border-radius:50%;background:white;box-shadow:0 0 10px white;opacity:.75;animation:twinkle 2.8s ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.25;transform:scale(.75)}to{opacity:1;transform:scale(1.15)}}
.app{width:min(1180px,94vw);margin:0 auto;padding:22px 0 30px;}
.header{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:16px}
.brand{display:flex;gap:12px;align-items:center}.logo{font-size:42px;filter:drop-shadow(0 0 14px var(--cyan))}
h1{font-size:clamp(24px,4vw,44px);line-height:1;margin:0;text-transform:uppercase;letter-spacing:.8px}.sub{opacity:.78;margin-top:5px}
.sound{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;padding:10px 13px;border-radius:16px;cursor:pointer;font-weight:700}
.panel{border:1px solid rgba(126,231,255,.25);background:linear-gradient(180deg,rgba(15,23,42,.82),rgba(2,6,23,.78));backdrop-filter:blur(14px);border-radius:28px;box-shadow:0 20px 70px rgba(0,0,0,.35),inset 0 0 30px rgba(126,231,255,.06);overflow:hidden}
.intro{padding:36px;text-align:center;min-height:540px;display:grid;place-items:center;position:relative}
.compass{width:190px;height:190px;border-radius:50%;border:3px solid rgba(126,231,255,.45);margin:0 auto 18px;position:relative;background:radial-gradient(circle,rgba(126,231,255,.15),rgba(255,255,255,.03));box-shadow:0 0 40px rgba(126,231,255,.25);animation:pulse 2.5s ease-in-out infinite}
.compass:before{content:"N";position:absolute;top:8px;left:50%;transform:translateX(-50%);font-weight:900;color:var(--gold)}
.needle{position:absolute;left:50%;top:50%;width:6px;height:78px;background:linear-gradient(var(--bad),var(--cyan));transform-origin:50% 92%;transform:translate(-50%,-92%) rotate(25deg);border-radius:8px;animation:needle 4s ease-in-out infinite}
@keyframes needle{50%{transform:translate(-50%,-92%) rotate(205deg)}}@keyframes pulse{50%{box-shadow:0 0 70px rgba(126,231,255,.45)}}
.startBtn,.mainBtn{border:none;border-radius:18px;padding:15px 24px;background:linear-gradient(135deg,#22d3ee,#2563eb);color:white;font-weight:900;font-size:17px;cursor:pointer;box-shadow:0 14px 30px rgba(37,99,235,.32);}
.startBtn:hover,.mainBtn:hover{transform:translateY(-2px)}
.game{display:none;padding:18px}
.topbar{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-bottom:16px}
.constellation{min-height:250px;border:1px solid rgba(255,255,255,.13);border-radius:22px;background:radial-gradient(circle at center,rgba(126,231,255,.08),rgba(15,23,42,.35));position:relative;overflow:hidden}
.constellation svg{position:absolute;inset:0;width:100%;height:100%}
.info{padding:18px;border:1px solid rgba(255,255,255,.13);border-radius:22px;background:rgba(255,255,255,.06)}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.stat{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.11);border-radius:15px;padding:12px;text-align:center}.stat b{display:block;font-size:25px;color:var(--gold)}
.progress{height:12px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;margin-top:12px}.bar{height:100%;width:0;background:linear-gradient(90deg,#22d3ee,#4ade80,#ffd36b);transition:.4s}
.questionBox{padding:24px;border-radius:24px;background:var(--card);border:1px solid rgba(126,231,255,.22)}
.qnum{color:var(--gold);font-weight:900;margin-bottom:8px}.qtext{font-size:clamp(18px,2.5vw,25px);font-weight:800;line-height:1.35}
.options{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}.option{text-align:left;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:white;border-radius:18px;padding:15px 16px;cursor:pointer;font-size:16px;line-height:1.35;transition:.2s;min-height:64px}
.option:hover{background:rgba(126,231,255,.16);transform:translateY(-2px)}.option .letter{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:10px;background:rgba(126,231,255,.18);color:var(--cyan);font-weight:900;margin-right:8px}
.option.correct{background:rgba(74,222,128,.25);border-color:var(--good)}.option.wrong{background:rgba(251,113,133,.25);border-color:var(--bad);animation:shake .35s}
@keyframes shake{25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
.feedback{min-height:46px;margin-top:14px;font-weight:800;font-size:18px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.secondary{border:1px solid rgba(255,255,255,.17);border-radius:14px;background:rgba(255,255,255,.08);color:white;padding:11px 14px;font-weight:800;cursor:pointer}
.results{display:none;padding:32px;text-align:center}.trophy{font-size:76px;filter:drop-shadow(0 0 18px var(--gold))}.big{font-size:clamp(28px,5vw,52px);font-weight:950;margin:8px 0;text-transform:uppercase}
.resultGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:24px auto;max-width:760px}.resultGrid .stat{padding:18px}
@media(max-width:760px){.header,.topbar{grid-template-columns:1fr;display:grid}.options{grid-template-columns:1fr}.resultGrid{grid-template-columns:repeat(2,1fr)}.intro{padding:24px 18px}}
</style>
</head>
<body>
<div class="sky" id="sky"><div class="moon"></div><div class="cloud c1"></div><div class="cloud c2"></div></div>
<div class="app">
  <div class="header"><div class="brand"><div class="logo">🧭</div><div><h1>Bầu trời định hướng</h1><div class="sub">Bộ câu hỏi 126 câu · Khám phá phương hướng qua bầu trời đêm</div></div></div><button class="sound" id="soundBtn">🔊 Âm thanh</button></div>
  <div class="panel">
    <section class="intro" id="intro"><div><div class="compass"><div class="needle"></div></div><h2 class="big">Khám phá bầu trời đêm</h2><p style="max-width:720px;margin:0 auto 22px;opacity:.82;font-size:18px">Trả lời đúng để thắp sáng từng vì sao, nối thành chòm sao và hoàn thành hành trình định hướng.</p><button class="startBtn" onclick="startGame()">BẮT ĐẦU</button></div></section>
    <section class="game" id="game">
      <div class="topbar"><div class="constellation"><svg id="constellation" viewBox="0 0 600 260"></svg></div><div class="info"><div style="font-weight:900;color:var(--cyan)">Đài quan sát</div><div class="progress"><div class="bar" id="bar"></div></div><div class="stats"><div class="stat"><span>Đúng</span><b id="correct">0</b></div><div class="stat"><span>Sai</span><b id="wrong">0</b></div><div class="stat"><span>Câu</span><b id="count">1/126</b></div><div class="stat"><span>Điểm</span><b id="score">0</b></div></div></div></div>
      <div class="questionBox"><div class="qnum" id="qnum">Câu 1</div><div class="qtext" id="qtext"></div><div class="options" id="options"></div><div class="feedback" id="feedback"></div><div class="actions"><button class="secondary" onclick="resetGame()">↺ Làm lại</button><button class="secondary" onclick="saveAndExit()">💾 Lưu tiến trình</button></div></div>
    </section>
    <section class="results" id="results"><div class="trophy">🌌</div><div class="big">Bầu trời đã sáng</div><p id="rank" style="font-size:20px;font-weight:800;color:var(--gold)"></p><div class="resultGrid"><div class="stat"><span>Tổng câu</span><b>126</b></div><div class="stat"><span>Đúng</span><b id="rCorrect">0</b></div><div class="stat"><span>Sai</span><b id="rWrong">0</b></div><div class="stat"><span>Tỷ lệ</span><b id="rPct">0%</b></div></div><button class="mainBtn" onclick="resetGame()">CHƠI LẠI</button></section>
  </div>
</div>
<script>
const QUESTIONS = [{"id": 1, "question": "Điểm Bắc là gì?", "options": ["Là giao điểm giữa mặt phẳng chân trời với đường thẳng góc, hạ từ Bắc thiên cực xuống", "Là giao điểm giữa mặt phẳng xích đạo với đường thẳng góc, hạ từ Bắc thiên cực xuống", "Là giao điểm giữa trục vũ trụ với đường thẳng góc. hạ từ Bắc thiên cực xuống", "Là giao điểm giữa mặt phẳng xích đạo với đường thẳng góc, hạ từ Nam thiên cực xuống"], "answer": 0}, {"id": 2, "question": "Có mấy loại góc phương vị?", "options": ["Góc phương vị thật và góc phương vị giả", "Góc phương vị thật và góc phương vị từ", "Cả hai đều đúng", "Cả hai đều sai"], "answer": 1}, {"id": 3, "question": "Trên thực tế người ta thường sử dụng góc Phương vị nào?", "options": ["Góc phương vị thật", "Góc phương vị giả", "Góc phương vị từ", "Cả 3 đều sai"], "answer": 0}, {"id": 4, "question": "Với cách gọi tên Phương hướng theo góc thì hướng chính nam có góc góc Phương vị bằng bao nhiêu?", "options": ["00 hoặc 3600", "1800", "900", "2700"], "answer": 1}, {"id": 5, "question": "Ký hiệu hướng nào sau đây không chính xác?", "options": ["NNE, SSW, NNW, SWW", "ENE, ESE, NNW, SW, SSE", "NNW, WSW, EES, SSW", "SW, NW, ESE, SWW"], "answer": 2}, {"id": 6, "question": "Theo cách gọi tên theo số trên đồng hồ đeo tay thì góc 210 đang chỉ số máy trong kim đồng hồ ?", "options": ["6", "7", "8", "9"], "answer": 1}, {"id": 7, "question": "Hướng Tây Tây Bắc có góc phương vị là bao nhiêu?", "options": ["157.50", "292.50", "247.50", "112.50"], "answer": 1}, {"id": 8, "question": "Để thuận tiện tính toán Liên Xô (cũ) và khối hiệp ước vác-xa-va thống nhất qui chẵn ly giác bằng bao nhiêu ?", "options": ["6400", "6000", "6281", "Cả 3 đều sai"], "answer": 1}, {"id": 9, "question": "Để thuận tiện tính toán Mỹ và Các nước phương Tây, NATO thống nhất qui chẵn ly giác bằng bao nhiêu ?", "options": ["1/6400 góc đầy", "6400", "6000", "Cả A và B đều đúng"], "answer": 3}, {"id": 10, "question": "Độ ly giác của góc Đông Đông Nam tính theo độ ly giác của Liên Xô (cũ let idx=0, correct=0, wrong=0, locked=false, soundOn=true, answered=[];
const letters=['A','B','C','D'];
const sky=document.getElementById('sky');
for(let i=0;i<130;i++){const s=document.createElement('i');s.className='star';const size=Math.random()*2.2+1;s.style.width=s.style.height=size+'px';s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';s.style.animationDelay=Math.random()*3+'s';sky.appendChild(s)}
const ctx=()=>new (window.AudioContext||window.webkitAudioContext)(); let audioCtx=null;
function beep(freq=440,dur=.08,type='sine',gain=.05){if(!soundOn)return; audioCtx=audioCtx||ctx(); const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=type;o.frequency.value=freq;g.gain.value=gain;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur)}
document.getElementById('soundBtn').onclick=()=>{soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'🔊 Âm thanh':'🔇 Tắt âm'};
function startGame(){const saved=localStorage.getItem('skyNav126'); if(saved){try{const st=JSON.parse(saved); if(st.idx>0&&st.idx<QUESTIONS.length&&confirm('Bạn đang làm đến câu '+(st.idx+1)+'. Tiếp tục không?')){idx=st.idx;correct=st.correct;wrong=st.wrong;answered=st.answered||[];}}catch(e){}}document.getElementById('intro').style.display='none';document.getElementById('game').style.display='block';render();}
function render(){locked=false; const q=QUESTIONS[idx]; document.getElementById('qnum').textContent='Câu '+q.id; document.getElementById('qtext').textContent=q.question; document.getElementById('count').textContent=(idx+1)+'/'+QUESTIONS.length; document.getElementById('correct').textContent=correct;document.getElementById('wrong').textContent=wrong;document.getElementById('score').textContent=correct*10;document.getElementById('bar').style.width=(idx/QUESTIONS.length*100)+'%'; document.getElementById('feedback').textContent=''; const wrap=document.getElementById('options');wrap.innerHTML=''; q.options.forEach((op,i)=>{const b=document.createElement('button');b.className='option';b.innerHTML='<span class="letter">'+letters[i]+'</span>'+op;b.onclick=()=>choose(i,b);wrap.appendChild(b);}); drawStars(); save();}
function choose(i,btn){if(locked)return; locked=true; const q=QUESTIONS[idx]; const all=[...document.querySelectorAll('.option')]; all.forEach(b=>b.disabled=true); if(i===q.answer){correct++;answered[idx]=true;btn.classList.add('correct');document.getElementById('feedback').innerHTML='✅ Chính xác! Một vì sao vừa được thắp sáng.';beep(760,.12,'triangle',.07); setTimeout(()=>beep(980,.1,'triangle',.05),120)}else{wrong++;answered[idx]=false;btn.classList.add('wrong');all[q.answer]?.classList.add('correct');document.getElementById('feedback').innerHTML='❌ Chưa đúng. Đáp án đúng: <b>'+letters[q.answer]+'</b>';beep(150,.18,'sawtooth',.06)} drawStars(); setTimeout(()=>{idx++; if(idx>=QUESTIONS.length)finish(); else render();},1450)}
function drawStars(){const svg=document.getElementById('constellation'); svg.innerHTML=''; const total=QUESTIONS.length; const lit=answered.filter(Boolean).length; const n=42; const pts=[]; for(let i=0;i<n;i++){const angle=i*.9; const r=18+i*2.2; pts.push([300+Math.cos(angle)*r,130+Math.sin(angle)*r])} for(let i=1;i<pts.length;i++){const on=i<Math.ceil(lit/total*n); const [x1,y1]=pts[i-1], [x2,y2]=pts[i]; const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',x1);line.setAttribute('y1',y1);line.setAttribute('x2',x2);line.setAttribute('y2',y2);line.setAttribute('stroke',on?'rgba(126,231,255,.75)':'rgba(255,255,255,.12)');line.setAttribute('stroke-width',on?'2.2':'1');svg.appendChild(line)} pts.forEach((p,i)=>{const on=i<Math.ceil(lit/total*n); const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',p[0]);c.setAttribute('cy',p[1]);c.setAttribute('r',on?4.5:2.8);c.setAttribute('fill',on?'#fff':'rgba(255,255,255,.28)');c.setAttribute('filter',on?'drop-shadow(0 0 8px #7ee7ff)':'');svg.appendChild(c)}); const txt=document.createElementNS('http://www.w3.org/2000/svg','text');txt.setAttribute('x',300);txt.setAttribute('y',238);txt.setAttribute('text-anchor','middle');txt.setAttribute('fill','#ffd36b');txt.setAttribute('font-weight','800');txt.textContent='Đã thắp sáng '+lit+'/'+total+' vì sao';svg.appendChild(txt)}
function finish(){localStorage.removeItem('skyNav126');document.getElementById('game').style.display='none';document.getElementById('results').style.display='block';const pct=Math.round(correct/QUESTIONS.length*1000)/10;document.getElementById('rCorrect').textContent=correct;document.getElementById('rWrong').textContent=wrong;document.getElementById('rPct').textContent=pct+'%';let rank=pct>=95?'Bậc thầy định hướng':pct>=85?'Quan sát viên xuất sắc':pct>=70?'Hoàn thành tốt':'Cần ôn luyện thêm';document.getElementById('rank').textContent=rank;beep(680,.14,'triangle',.07);setTimeout(()=>beep(880,.14,'triangle',.07),180);setTimeout(()=>beep(1080,.2,'triangle',.07),360)}
function save(){localStorage.setItem('skyNav126',JSON.stringify({idx,correct,wrong,answered}))}
function saveAndExit(){save(); alert('Đã lưu tiến trình.')}
function resetGame(){localStorage.removeItem('skyNav126');idx=0;correct=0;wrong=0;answered=[];document.getElementById('results').style.display='none';document.getElementById('intro').style.display='none';document.getElementById('game').style.display='block';render();}
</script>
